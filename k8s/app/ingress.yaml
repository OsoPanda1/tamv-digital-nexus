# TAMV MD-X4™ - Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tamv-ingress
  namespace: tamv
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  tls:
    - hosts:
        - tamv.network
        - app.tamv.network
        - api.tamv.network
      secretName: tamv-tls
  rules:
    - host: tamv.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tamv-app
                port:
                  number: 80
    - host: app.tamv.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tamv-app
                port:
                  number: 80
    - host: api.tamv.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tamv-app
                port:
                  number: 80
---
# Grafana Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: tamv
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - grafana.tamv.network
      secretName: grafana-tls
  rules:
    - host: grafana.tamv.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
